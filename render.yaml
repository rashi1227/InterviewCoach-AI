services:
  - type: web
    name: interview-coach-backend
    runtime: java
    region: singapore # Adjust if needed
    plan: free
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/interview-coach-0.0.1-SNAPSHOT.jar
    rootDir: backend
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://db.yvxlwtflwfhilcmdydlz.supabase.co:5432/postgres
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false # User should set this in Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        value: https://interview-coach-ai-gc5n.vercel.app
